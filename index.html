<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniPad AI - Tenora Labs</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1f20">
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <style>
        :root {
            --bg-dark: #131314;
            --panel-dark: #1e1f20;
            --txt-light: #e3e3e3;
            --accent: #4285f4;
            --border: #444746;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--txt-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 260px;
            background-color: var(--panel-dark);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 15px;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--accent);
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            margin-top: 10px;
        }

        .history-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
            margin-bottom: 5px;
            background: #232425;
            user-select: none; /* Prevents text selection highlight during long-press */
            -webkit-user-select: none;
        }

        .history-item:hover { background-color: #333537; }

        #main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        #mobile-header {
            display: none;
            background: var(--panel-dark);
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            align-items: center;
            justify-content: space-between;
        }

        .menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px 20% 120px 20%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        .user {
            align-self: flex-end;
            background-color: #2b2a2a;
            padding: 12px 18px;
            border-radius: 18px 18px 0 18px;
        }

        .ai { 
            align-self: flex-start; 
            line-height: 1.6; 
            width: 100%;
        }

        .ai-header-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .speaker-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 2px 6px;
            border-radius: 4px;
            transition: color 0.2s;
        }

        .speaker-btn:hover { color: var(--accent); }
        .speaker-btn.reading { color: #2e7d32; font-weight: bold; }

        /* Structured Markdown Sub-styling */
        .ai p { margin: 0 0 10px 0; }
        .ai ul, .ai ol { margin: 0 0 10px 0; padding-left: 20px; }
        .ai code { background: #2b2a2a; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        
        /* Gemini-Style Structured Code Blocks */
        .code-block-wrapper {
            background: #0f0f10;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin: 15px 0;
            overflow: hidden;
        }

        .code-block-header {
            background: #1e1f20;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #aaa;
            border-bottom: 1px solid var(--border);
        }

        .copy-code-btn {
            background: #2b2a2a;
            border: 1px solid var(--border);
            color: var(--txt-light);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .copy-code-btn:active { background: var(--accent); }

        .code-block-wrapper pre {
            margin: 0;
            padding: 15px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 0.9rem;
        }

        #input-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            background-color: var(--panel-dark);
            border: 1px solid var(--border);
            border-radius: 28px;
            display: flex;
            padding: 10px 20px;
            align-items: center;
        }

        #user-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--txt-light);
            font-size: 1rem;
            outline: none;
            resize: none;
            max-height: 100px;
        }

        #send-btn {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-weight: bold;
            padding: 0 10px;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 10px;
            background: #2e7d32;
        }
        .offline { background: #c62828; }

        @media (max-width: 768px) {
            #sidebar {
                position: absolute; left: 0; top: 0; bottom: 0;
                transform: translateX(-100%);
            }
            #sidebar.open { transform: translateX(0); }
            #mobile-header { display: flex; }
            #chat-container { padding: 20px 15px 120px 15px; }
            #input-container { width: 92%; bottom: 15px; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="brand">
            <span>TENORA LABS</span>
            <button class="menu-btn" id="close-sidebar" style="display:none;">&times;</button>
        </div>
        <div id="network-status" class="status-badge" style="margin-bottom:15px; text-align:center;">Online</div>
        <button id="new-chat-btn" style="width:100%; padding: 12px; border-radius: 20px; border: 1px solid var(--border); background: #2b2a2a; color: #fff; cursor: pointer; font-weight:bold;">+ New Chat</button>
        <h4 style="margin: 20px 0 10px 0; color: #aaa; font-size: 0.85rem;">Recent Activities</h4>
        <div class="history-list" id="history-list"></div>
    </div>

    <div id="main-chat">
        <div id="mobile-header">
            <button class="menu-btn" id="menu-toggle">&#9776;</button>
            <strong style="color: var(--accent);">OmniPad AI</strong>
            <span id="mobile-status" style="font-size:0.8rem; color:#2e7d32;">●</span>
        </div>

        <div id="chat-container">
            <div class="message ai">
                <div class="ai-header-wrapper">
                    <strong>OmniPad AI</strong>
                    <button class="speaker-btn" onclick="readText(this)">🔊</button>
                </div>
                <div class="message-text-content">Hello, I am OmniPad AI, compiled by Tenora Labs. Structure parsing, speaker mechanics, and log arrays are fully initialized.</div>
            </div>
        </div>

        <div id="input-container">
            <textarea id="user-input" rows="1" placeholder="Ask OmniPad AI..."></textarea>
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        let db;
        let currentSessionId = Date.now().toString();
        let activeUtterance = null; // Track current spoken audio

        // Configure Marked Renderer for structural code styling
        const renderer = new marked.Renderer();
        renderer.code = function(codeObj, infostring) {
            // Safely handle newer marked.js object parsing architecture
            const code = typeof codeObj === 'object' ? codeObj.text : codeObj;
            const lang = (typeof codeObj === 'object' ? codeObj.lang : infostring) || 'code';
            return `
                <div class="code-block-wrapper">
                    <div class="code-block-header">
                        <span>${lang}</span>
                        <button class="copy-code-btn" onclick="copySnippet(this)">Copy</button>
                    </div>
                    <pre><code>${code}</code></pre>
                </div>
            `;
        };
        marked.setOptions({ renderer: renderer, breaks: true });

        // Global Copy Function Engine
        window.copySnippet = function(button) {
            const preElement = button.parentElement.nextElementSibling;
            const codeText = preElement.textContent;
            
            navigator.clipboard.writeText(codeText).then(() => {
                button.textContent = "Copied!";
                button.style.background = "#2e7d32";
                setTimeout(() => {
                    button.textContent = "Copy";
                    button.style.background = "#2b2a2a";
                }, 2000);
            });
        };

        // Text-to-Speech Engine
        window.readText = function(button) {
            if ('speechSynthesis' in window) {
                // If already speaking, cancel it
                if (window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel();
                    if(button.classList.contains('reading')) {
                        button.classList.remove('reading');
                        button.textContent = "🔊";
                        return;
                    }
                }

                // Clear styling on any old reading buttons
                document.querySelectorAll('.speaker-btn').forEach(btn => {
                    btn.classList.remove('reading');
                    btn.textContent = "🔊";
                });

                // Target the message text container next to or beneath the header wrapper
                const messageContainer = button.closest('.message').querySelector('.message-text-content');
                
                // Use innerText to capture pure language layout text, ignoring raw HTML elements
                let vocalText = messageContainer.innerText;

                activeUtterance = new SpeechSynthesisUtterance(vocalText);
                
                activeUtterance.onstart = () => {
                    button.classList.add('reading');
                    button.textContent = "⏹️";
                };

                activeUtterance.onend = () => {
                    button.classList.remove('reading');
                    button.textContent = "🔊";
                };

                activeUtterance.onerror = () => {
                    button.classList.remove('reading');
                    button.textContent = "🔊";
                };

                window.speechSynthesis.speak(activeUtterance);
            } else {
                alert("Your mobile browser does not natively support text-to-speech audio streams.");
            }
        };

        // Initialize Local Storage Arrays
        const request = indexedDB.open("OmniPadStructuredDB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("conversations")) {
                db.createObjectStore("conversations", { keyPath: "id" });
            }
        };
        request.onsuccess = (e) => { db = e.target.result; renderHistorySidebar(); };

        // Network Status Observers
        window.addEventListener('online', toggleNetwork);
        window.addEventListener('offline', toggleNetwork);
        function toggleNetwork() {
            const badge = document.getElementById('network-status');
            const dot = document.getElementById('mobile-status');
            if (navigator.onLine) {
                badge.textContent = "Online"; badge.classList.remove('offline');
                dot.style.color = "#2e7d32";
            } else {
                badge.textContent = "Offline Mode"; badge.classList.add('offline');
                dot.style.color = "#c62828";
            }
        }

        // Drawer Event Wireframes
        const sidebar = document.getElementById('sidebar');
        document.getElementById('menu-toggle').addEventListener('click', () => sidebar.classList.add('open'));
        document.getElementById('close-sidebar').style.display = window.innerWidth <= 768 ? 'block' : 'none';
        document.getElementById('close-sidebar').addEventListener('click', () => sidebar.classList.remove('open'));

        document.getElementById('send-btn').addEventListener('click', processMessage);
        document.getElementById('user-input').addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); processMessage(); }
        });

        document.getElementById('new-chat-btn').addEventListener('click', () => {
            currentSessionId = Date.now().toString();
            document.getElementById('chat-container').innerHTML = `
                <div class="message ai">
                    <div class="ai-header-wrapper">
                        <strong>OmniPad AI</strong>
                        <button class="speaker-btn" onclick="readText(this)">🔊</button>
                    </div>
                    <div class="message-text-content">Started a fresh conversation canvas.</div>
                </div>`;
            sidebar.classList.remove('open');
            if (window.speechSynthesis) window.speechSynthesis.cancel();
        });

        async function processMessage() {
            const input = document.getElementById('user-input');
            const promptText = input.value.trim();
            if(!promptText) return;

            appendMsgUI(promptText, 'user');
            input.value = '';
            sidebar.classList.remove('open');

            await writeToDB(currentSessionId, { role: 'user', text: promptText });

            if (navigator.onLine) {
                try {
                    const res = await fetch('https://stsnwvlihfwmexivtcjm.supabase.co/functions/v1/hyper-function', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: promptText })
                    });
                    const data = await res.json();
                    
                    if (data.error) {
                        appendMsgUI("Engine Error: " + data.error, 'ai');
                    } else {
                        appendMsgUI(data.reply, 'ai');
                        await writeToDB(currentSessionId, { role: 'ai', text: data.reply });
                    }
                } catch (e) {
                    appendMsgUI("Could not establish handshake with Supabase edge gateway.", 'ai');
                }
            } else {
                const offReply = "Saved prompt locally. Response arrays will parse once internet access is restored.";
                appendMsgUI(offReply, 'ai');
                await writeToDB(currentSessionId, { role: 'ai', text: offReply });
            }
        }

        function appendMsgUI(text, sender) {
            const box = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.classList.add('message', sender);
            
            if (sender === 'user') {
                div.innerHTML = `<strong>You</strong><div class="message-text-content">${text}</div>`;
            } else {
                const htmlContent = marked.parse(text);
                div.innerHTML = `
                    <div class="ai-header-wrapper">
                        <strong>OmniPad AI</strong>
                        <button class="speaker-btn" onclick="readText(this)">🔊</button>
                    </div>
                    <div class="message-text-content">${htmlContent}</div>
                `;
            }
            
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function writeToDB(sessionId, messageBlock) {
            return new Promise((resolve) => {
                const tx = db.transaction(["conversations"], "readwrite");
                const store = tx.objectStore("conversations");
                const getReq = store.get(sessionId);

                getReq.onsuccess = () => {
                    let record = getReq.result || { id: sessionId, title: messageBlock.text, logs: [] };
                    record.logs.push(messageBlock);
                    store.put(record);
                    tx.oncomplete = () => { renderHistorySidebar(); resolve(); };
                };
            });
        }

        function deleteSession(sessionId) {
            if (confirm("Do you want to delete this chat permanently?")) {
                const tx = db.transaction(["conversations"], "readwrite");
                const store = tx.objectStore("conversations");
                store.delete(sessionId);
                tx.oncomplete = () => {
                    renderHistorySidebar();
                    // If the active chat was deleted, clear viewport
                    if (currentSessionId === sessionId) {
                        document.getElementById('new-chat-btn').click();
                    }
                };
            }
        }

        function renderHistorySidebar() {
            const list = document.getElementById('history-list');
            if(!list) return;
            list.innerHTML = '';
            const store = db.transaction(["conversations"], "readonly").objectStore("conversations");
            
            store.openCursor(null, 'prev').onsuccess = (e) => {
                const cursor = e.target.result;
                if(cursor) {
                    const id = cursor.value.id;
                    const item = document.createElement('div');
                    item.classList.add('history-item');
                    item.textContent = cursor.value.title;
                    
                    // Route basic click handler
                    item.onclick = () => loadActiveSession(id);
                    
                    // High performance Long-Press (Press and Hold) event tracking setup
                    let pressTimer;
                    
                    const startPress = () => {
                        pressTimer = setTimeout(() => {
                            deleteSession(id);
                        }, 800); // 800ms threshold for a clean mobile holding gesture
                    };
                    
                    const cancelPress = () => {
                        clearTimeout(pressTimer);
       
                    list.appendChild(item);
                    cursor.continue();
                }
            };
        }

        function loadActiveSession(sessionId) {
            currentSessionId = sessionId;
            const store = db.transaction(["conversations"], "readonly").objectStore("conversations");
            store.get(sessionId).onsuccess = (e) => {
                const record = e.target.result;
                if(!record) return;
                const box = document.getElementById('chat-container');
                box.innerHTML = '';
                record.logs.forEach(msg => appendMsgUI(msg.text, msg.role));
                sidebar.classList.remove('open');
                if (window.speechSynthesis) window.speechSynthesis.cancel();
            };
        }
    </script>
</body>
</html>
