<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniPad AI - Tenora Labs</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1f20">
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <style>
        :root {
            --bg-dark: #131314;
            --panel-dark: #1e1f20;
            --txt-light: #e3e3e3;
            --accent: #4285f4;
            --border: #444746;
            --code-bg: #0f0f10;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark); color: var(--txt-light);
            display: flex; height: 100vh; overflow: hidden;
        }
        #sidebar {
            width: 260px; background-color: var(--panel-dark);
            border-right: 1px solid var(--border); display: flex;
            flex-direction: column; padding: 15px; transition: transform 0.3s ease; z-index: 10;
        }
        .brand {
            font-size: 1.2rem; font-weight: bold; margin-bottom: 20px;
            color: var(--accent); letter-spacing: 1px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .history-list { flex: 1; overflow-y: auto; margin-top: 10px; }
        .history-item {
            padding: 12px; border-radius: 8px; cursor: pointer;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            font-size: 0.9rem; margin-bottom: 5px; background: #232425;
            user-select: none; -webkit-user-select: none;
        }
        .history-item:hover { background-color: #333537; }
        #main-chat { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }
        #mobile-header {
            display: none; background: var(--panel-dark); padding: 10px 15px;
            border-bottom: 1px solid var(--border); align-items: center; justify-content: space-between;
        }
        .menu-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        
        /* Layout Configurations */
        #chat-container { flex: 1; overflow-y: auto; padding: 30px 20% 120px 20%; display: flex; flex-direction: column; gap: 24px; }
        .message { display: flex; flex-direction: column; max-width: 100%; animation: fadeIn 0.3s ease; }
        .user { align-self: flex-end; max-width: 85%; background-color: #2b2a2a; padding: 12px 18px; border-radius: 18px 18px 0 18px; }
        .ai { align-self: flex-start; line-height: 1.6; width: 100%; }
        
        .message strong { font-size: 0.9rem; color: #aaa; margin-bottom: 6px; display: block; }
        .user strong { color: var(--accent); text-align: right; }

        /* AI Text Styling */
        .message-text-content { width: 100%; font-size: 1rem; color: var(--txt-light); }
        .message-text-content p { margin: 0 0 12px 0; }
        .message-text-content p:last-child { margin-bottom: 0; }
        .message-text-content ul, .message-text-content ol { margin: 0 0 12px 0; padding-left: 20px; }
        
        /* ONLY apply block styles to standard single backticks */
        .message-text-content :not(pre) > code { background: #2b2a2a; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.95rem; }
        
        /* True AI Block Component Style (Clean Root Blocks) */
        .code-block-wrapper { 
            background: var(--code-bg); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            margin: 16px 0; 
            width: 100%;
            overflow: hidden; 
        }
        .code-block-header {
            background: #1e1f20; padding: 10px 16px; display: flex;
            justify-content: space-between; align-items: center; font-size: 0.8rem; color: #b4b7b9; border-bottom: 1px solid var(--border);
        }
        .copy-code-btn { 
            background: #2b2a2a; border: 1px solid var(--border); color: var(--txt-light); 
            padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: 500;
        }
        
        /* Pre-formatted block resetting targets */
        .code-block-wrapper pre { margin: 0; padding: 16px; overflow-x: auto; background: none; border: none; }
        .code-block-wrapper pre code { 
            background: none !important; 
            padding: 0 !important; 
            border-radius: 0 !important; 
            font-family: monospace; 
            font-size: 0.9rem; 
            line-height: 1.5; 
            color: #e3e3e3;
            display: block;
            white-space: pre;
        }
        
        #input-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 60%; background-color: var(--panel-dark); border: 1px solid var(--border);
            border-radius: 28px; display: flex; padding: 12px 24px; align-items: center;
        }
        #user-input { flex: 1; background: none; border: none; color: var(--txt-light); font-size: 1rem; outline: none; resize: none; max-height: 120px; }
        #send-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-weight: bold; padding: 0 10px; }
        .status-badge { font-size: 0.75rem; padding: 3px 8px; border-radius: 10px; background: #2e7d32; }
        .offline { background: #c62828; }

        /* Fully Updated Responsive Viewport Engine */
        @media (max-width: 768px) {
            #sidebar { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            #mobile-header { display: flex; }
            #chat-container { padding: 20px 14px 130px 14px; }
            #input-container { width: 94%; bottom: 12px; padding: 10px 18px; }
            .code-block-wrapper pre { padding: 12px; }
            .code-block-wrapper pre code { font-size: 0.85rem; }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="brand">
            <span>TENORA LABS</span>
            <button class="menu-btn" id="close-sidebar" style="display:none;">&times;</button>
        </div>
        <div id="network-status" class="status-badge" style="margin-bottom:15px; text-align:center;">Online</div>
        <button id="new-chat-btn" style="width:100%; padding: 12px; border-radius: 20px; border: 1px solid var(--border); background: #2b2a2a; color: #fff; cursor: pointer; font-weight:bold;">+ New Chat</button>
        <h4 style="margin: 20px 0 10px 0; color: #aaa; font-size: 0.85rem;">Recent Activities</h4>
        <div class="history-list" id="history-list"></div>
    </div>

    <div id="main-chat">
        <div id="mobile-header">
            <button class="menu-btn" id="menu-toggle">&#9776;</button>
            <strong style="color: var(--accent);">OmniPad AI</strong>
            <span id="mobile-status" style="font-size:0.8rem; color:#2e7d32;">●</span>
        </div>
        <div id="chat-container">
            <div class="message ai">
                <strong>OmniPad AI</strong>
                <div class="message-text-content">Hello, I am OmniPad AI, compiled by Tenora Labs. Ready for instructions.</div>
            </div>
        </div>
        <div id="input-container">
            <textarea id="user-input" rows="1" placeholder="Ask OmniPad AI..."></textarea>
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        let db;
        let currentSessionId = Date.now().toString();

        const renderer = new marked.Renderer();
        renderer.code = function(codeObj, infostring) {
            const code = typeof codeObj === 'object' ? codeObj.text : codeObj;
            const lang = (typeof codeObj === 'object' ? codeObj.lang : infostring) || 'code';
            return `
                <div class="code-block-wrapper">
                    <div class="code-block-header">
                        <span>${lang}</span>
                        <button class="copy-code-btn" onclick="copySnippet(this)">Copy</button>
                    </div>
                    <pre><code>${code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>
                </div>`;
        };
        marked.setOptions({ renderer: renderer, breaks: true });

        window.copySnippet = function(button) {
            const preElement = button.closest('.code-block-wrapper').querySelector('pre code');
            const codeText = preElement.textContent;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(codeText).then(() => showSuccess(button), () => fallbackCopy(codeText, button));
            } else {
                fallbackCopy(codeText, button);
            }
        };

        function fallbackCopy(text, button) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand("copy"); showSuccess(button); } catch (err) { alert("Copy failed."); }
            document.body.removeChild(textArea);
        }

        function showSuccess(button) {
            button.textContent = "Copied!"; button.style.background = "#2e7d32";
            setTimeout(() => { button.textContent = "Copy"; button.style.background = "#2b2a2a"; }, 2000);
        }

        const request = indexedDB.open("OmniPadStructuredDB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("conversations")) db.createObjectStore("conversations", { keyPath: "id" });
        };
        request.onsuccess = (e) => { db = e.target.result; renderHistorySidebar(); };

        window.addEventListener('online', toggleNetwork);
        window.addEventListener('offline', toggleNetwork);
        function toggleNetwork() {
            const badge = document.getElementById('network-status'), dot = document.getElementById('mobile-status');
            if (navigator.onLine) { badge.textContent = "Online"; badge.classList.remove('offline'); dot.style.color = "#2e7d32"; }
            else { badge.textContent = "Offline Mode"; badge.classList.add('offline'); dot.style.color = "#c62828"; }
        }

        const sidebar = document.getElementById('sidebar');
        document.getElementById('menu-toggle').addEventListener('click', () => sidebar.classList.add('open'));
        document.getElementById('close-sidebar').style.display = window.innerWidth <= 768 ? 'block' : 'none';
        document.getElementById('close-sidebar').addEventListener('click', () => sidebar.classList.remove('open'));
        document.getElementById('send-btn').addEventListener('click', processMessage);
        document.getElementById('user-input').addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); processMessage(); } });

        document.getElementById('new-chat-btn').addEventListener('click', () => {
            currentSessionId = Date.now().toString();
            document.getElementById('chat-container').innerHTML = `
                <div class="message ai">
                    <strong>OmniPad AI</strong>
                    <div class="message-text-content">Fresh canvas initialized. Ready for instructions.</div>
                </div>`;
            sidebar.classList.remove('open');
        });

        async function processMessage() {
            const input = document.getElementById('user-input'), promptText = input.value.trim();
            if(!promptText) return;
            appendMsgUI(promptText, 'user'); input.value = ''; sidebar.classList.remove('open');
            await writeToDB(currentSessionId, { role: 'user', text: promptText });

            if (navigator.onLine) {
                try {
                    const res = await fetch('https://stsnwvlihfwmexivtcjm.supabase.co/functions/v1/hyper-function', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ prompt: promptText })
                    });
                    const data = await res.json();
                    if (data.error) appendMsgUI("Engine Error: " + data.error, 'ai');
                    else { appendMsgUI(data.reply, 'ai'); await writeToDB(currentSessionId, { role: 'ai', text: data.reply }); }
                } catch (e) { appendMsgUI("Could not establish handshake with server backend.", 'ai'); }
            } else {
                const offReply = "Saved locally. Syncing data maps once network connection is restored.";
                appendMsgUI(offReply, 'ai'); await writeToDB(currentSessionId, { role: 'ai', text: offReply });
            }
        }

        function appendMsgUI(text, sender) {
            const box = document.getElementById('chat-container'), div = document.createElement('div');
            div.classList.add('message', sender);
            
            if (sender === 'user') {
                div.innerHTML = `<strong>You</strong><div class="message-text-content"><p>${text}</p></div>`;
            } else {
                div.innerHTML = `<strong>OmniPad AI</strong><div class="message-text-content">${marked.parse(text)}</div>`;
            }
            
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        }

        function writeToDB(sessionId, messageBlock) {
            return new Promise((resolve) => {
                const tx = db.transaction(["conversations"], "readwrite"), store = tx.objectStore("conversations"), getReq = store.get(sessionId);
                getReq.onsuccess = () => {
                    let record = getReq.result || { id: sessionId, title: messageBlock.text, logs: [] };
                    record.logs.push(messageBlock); store.put(record); tx.oncomplete = () => { renderHistorySidebar(); resolve(); };
                };
            });
        }

        function deleteSession(sessionId) {
            if (confirm("Delete this chat session permanently from history?")) {
                const tx = db.transaction(["conversations"], "readwrite");
                tx.objectStore("conversations").delete(sessionId);
                tx.oncomplete = () => { renderHistorySidebar(); if (currentSessionId === sessionId) document.getElementById('new-chat-btn').click(); };
            }
        }

        function renderHistorySidebar() {
            const list = document.getElementById('history-list'); if(!list) return; list.innerHTML = '';
            db.transaction(["conversations"], "readonly").objectStore("conversations").openCursor(null, 'prev').onsuccess = (e) => {
                const cursor = e.target.result;
                if(cursor) {
                    const id = cursor.value.id, item = document.createElement('div');
                    item.classList.add('history-item'); item.textContent = cursor.value.title;
                    item.onclick = () => loadActiveSession(id);
                    
                    let pressTimer;
                    item.addEventListener('touchstart', () => { pressTimer = setTimeout(() => deleteSession(id), 800); });
                    item.addEventListener('touchend', () => clearTimeout(pressTimer));
                    item.addEventListener('mousedown', () => { pressTimer = setTimeout(() => deleteSession(id), 800); });
                    item.addEventListener('mouseup', () => clearTimeout(pressTimer));
                    item.addEventListener('mouseleave', () => clearTimeout(pressTimer));

                    list.appendChild(item); cursor.continue();
                }
            };
        }

        function loadActiveSession(sessionId) {
            currentSessionId = sessionId;
            db.transaction(["conversations"], "readonly").objectStore("conversations").get(sessionId).onsuccess = (e) => {
                const record = e.target.result; if(!record) return;
                const box = document.getElementById('chat-container'); box.innerHTML = '';
                record.logs.forEach(msg => appendMsgUI(msg.text, msg.role)); sidebar.classList.remove('open');
            };
        }
    </script>
</body>
    </html>
